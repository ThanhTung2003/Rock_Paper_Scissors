<!DOCTYPE html>

<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Rock Paper Scissors Game</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="base:app_id" content="6a2ab15665478aa1565aa11c" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Rock Paper Scissors</h1>
    </header>

    <div class="score-board">
        <div id="user-label" class="badge">User</div>
        <div id="computer-label" class="badge">Comp</div>
        <span id="user-score">0</span>:<span id="computer-score">0</span>
    </div>


    <div class="result">
        <p>Paper vs Rock. Paper Wins!!</p>
    </div>

    <div class="choices">
        <div class="choice" id="s">
            Scissors
        </div>
        <div class="choice" id="r">
            Rock
        </div>
        <div class="choice" id="p">
            Paper
        </div>
    </div>

    <p id="action-message">Your turn. </p>

    <div class="web3-container">
        <button id="connect-wallet-btn">Connect Wallet</button>
        <button id="start-game-btn" style="display: none;">Pay Fee to Start</button>
        <p id="wallet-status"></p>
    </div>
    <div id="toast" class="toast"></div>
    <script type="module" src="app.js"></script>
</body>

</html>
